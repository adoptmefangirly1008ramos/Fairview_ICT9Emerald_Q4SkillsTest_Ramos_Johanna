<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><head>
    <title>Login Authentication</title>
    
    <style>
        body {
            background-color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100pxh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        .box {
            background-color: #1a237e; 
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
            color: white;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
            margin-top:200px;
            height: 460px;
            width: 550px;
        }

    </style>
</head>
<body>

    <div class="box">
        <h2>Login Form</h2>
        
        <label>Username</label><br>
        <input type="text" id="username" placeholder="Enter here"  required; style="width: 90%; padding: 10px; margin: 10px 0; border-radius: 15px; border: none; text-align: center;"><br>

        <label>Password</label><br>
        <input type="password" id="password" placeholder="********" style="width: 90%; padding: 10px;margin: 10px 0; border-radius: 15px; border: none; text-align: center;"><br>

         <p id="display"></p>


    </form>

     <div style="margin: 15px 0;">
    <input type="checkbox" id="checked" onclick="message()"> 
    <label for="checked">Stay logged in</label>
    
    <p id="message"></p>
        
        <p style="font-size: 15px; margin-top: 20px;">
            Forgot username / password?
        </p>

        <a href="notebook.html">
        <button onclick="checkLogin()" class="btn-login" style="background-color: #5bc0de; border: none; padding: 10px 20px; border-radius: 15px; color: white; cursor: pointer; ">Login</button>
        <button onclick="window.location.reload()" class="btn-cancel" style="background-color: #f8f9fa; border: none; padding: 10px 20px;border-radius: 15px; cursor: pointer;
        " type="reset">Cancel</button>

       


   <script>

        function message() {
    let checked = document.getElementById("checked").checked;

    // switch statement to see if true or false
    switch(checked) {
        case true:
            document.getElementById("message").innerHTML = 
                "Your session will stay active on this device.";
            break;
        case false:
            document.getElementById("message").innerHTML = "";
            break;
    } 
} 


        let attempt_counter = 0;


        function checkLogin(){
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let inside = "Welcome " + username + "!";
            let not = "Access denied. Account locked after 3 attempts!";


        while (attempt_counter < 5) {
        if (username === "bakalover" && password === "loverbaka") {
            alert(inside);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "index.html";


            break; // stop loop
        }


        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 5 ";
            break; // stop loop for this click
        }


        }
        if (attempt_counter >= 3) {
                alert(not);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    </script>

</body>
</html>
